  <text x="40" y="512" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7c8682">One run per mode (median per 30 s). Controller: ~6.5 tok/s on Q8, then ~11 on Q4 &#8212; matching fixed Q4, the best baseline. Fixed Q8 stays slow throughout.</text>
