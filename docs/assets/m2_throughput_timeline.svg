<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="t d">
  <title id="t">Throughput over time: fixed Q8 vs fixed Q4 vs controller</title>
  <desc id="d">Per-request throughput (median per 30 s) over one 30-minute run on Raspberry Pi 5. Fixed Q8 stays near 6.5 tokens per second. Fixed Q4 stays near 11.3. The controller starts on Q8, switches to Q4 at the 63 C threshold around 7 minutes, and rises from about 6.5 to about 11 tokens per second.</desc>
  <rect width="960" height="520" fill="#f6f8f8"/>
  <text x="40" y="44" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#16241f">At the thermal switch, the controller climbs to the Q4 line</text>
  <text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#56635f">Per-request throughput over one 30-minute run &#183; Raspberry Pi 5, fan on.</text>
