<svg xmlns="http://www.w3.org/2000/svg" width="960" height="524" viewBox="0 0 960 524" role="img" aria-labelledby="t d">
  <title id="t">Controller thermal timeline on Raspberry Pi 5</title>
  <desc id="d">One representative 30-minute controller run. The device runs Q8 until the CPU reaches the 63 C upper threshold at about 7 minutes, switches to Q4 for the rest of the load, peaks at 67.5 C (well under the 82 C safety stop), and switches back to Q8 as the load winds down near 57 C.</desc>
  <rect width="960" height="524" fill="#f6f8f8"/>
  <text x="40" y="44" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#16241f">The control path firing on real hardware</text>
  <text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#56635f">CPU temperature over one controller run &#183; Raspberry Pi 5, fan on &#183; 30 minutes.</text>
  <rect x="70" y="110" width="850" height="320" fill="#ffffff" stroke="#e3e9e7"/>
  <line x1="70" y1="398.0" x2="920" y2="398.0" stroke="#eef2f0"/><text x="62" y="402.0" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">40</text><line x1="70" y1="334.0" x2="920" y2="334.0" stroke="#eef2f0"/><text x="62" y="338.0" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">50</text><line x1="70" y1="270.0" x2="920" y2="270.0" stroke="#eef2f0"/><text x="62" y="274.0" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">60</text><line x1="70" y1="206.0" x2="920" y2="206.0" stroke="#eef2f0"/><text x="62" y="210.0" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">70</text><line x1="70" y1="142.0" x2="920" y2="142.0" stroke="#eef2f0"/><text x="62" y="146.0" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">80</text>
  <line x1="70.0" y1="110" x2="70.0" y2="430" stroke="#eef2f0"/><text x="70.0" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">0</text><line x1="211.7" y1="110" x2="211.7" y2="430" stroke="#eef2f0"/><text x="211.7" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">5</text><line x1="353.3" y1="110" x2="353.3" y2="430" stroke="#eef2f0"/><text x="353.3" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">10</text><line x1="495.0" y1="110" x2="495.0" y2="430" stroke="#eef2f0"/><text x="495.0" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">15</text><line x1="636.7" y1="110" x2="636.7" y2="430" stroke="#eef2f0"/><text x="636.7" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">20</text><line x1="778.3" y1="110" x2="778.3" y2="430" stroke="#eef2f0"/><text x="778.3" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">25</text><line x1="920.0" y1="110" x2="920.0" y2="430" stroke="#eef2f0"/><text x="920.0" y="448" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#8a948f">30</text>
  <rect x="70" y="110" width="198.9" height="320" fill="#9aa6b2" opacity="0.10"/>
  <rect x="268.9" y="110" width="651.1" height="320" fill="#1f9d76" opacity="0.10"/>
  <text x="169.5" y="128" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#5b6770">Q8 active</text>
  <text x="594.5" y="128" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#15795b">Q4 active</text>
  <line x1="70" y1="129.2" x2="920" y2="129.2" stroke="#d23f3f" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="916" y="123.2" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#c0392b">82 &#176;C safety stop &#8212; never reached</text>
  <line x1="70" y1="250.8" x2="920" y2="250.8" stroke="#c9882f" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="74" y="244.8" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#a96f1f">upper threshold 63 &#176;C &#8594; switch to Q4</text>
  <line x1="70" y1="276.4" x2="920" y2="276.4" stroke="#3f72d4" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="74" y="291.4" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#2f56a8">lower threshold 59 &#176;C &#8594; switch back to Q8</text>
  <polyline points="70.0,401.2 80.6,334.6 91.1,309.7 101.6,299.4 112.2,285.4 122.7,278.3 133.2,267.4 143.8,271.3 154.3,264.2 164.8,271.3 175.4,264.2 185.9,267.4 196.4,264.2 206.9,264.2 217.5,264.2 228.0,271.3 238.5,260.4 249.1,257.2 259.6,257.2 268.9,250.2" fill="none" stroke="#6b7a86" stroke-width="2.4"/>
  <polyline points="268.9,250.2 270.2,260.4 280.7,246.3 291.3,243.1 301.8,246.3 312.3,239.3 322.8,236.1 333.4,236.1 343.9,239.3 354.5,236.1 365.0,239.3 375.5,239.3 386.0,239.3 396.5,239.3 407.1,236.1 417.6,243.1 428.1,232.2 438.7,229.0 449.3,236.1 459.9,236.1 470.4,236.1 481.0,236.1 491.5,236.1 502.0,232.2 512.6,229.0 523.1,232.2 533.6,232.2 544.2,229.0 554.7,236.1 565.2,232.2 575.8,236.1 586.3,232.2 596.8,236.1 607.3,225.2 617.9,232.2 628.4,232.2 639.0,232.2 649.5,232.2 660.0,232.2 670.6,232.2 681.1,229.0 691.6,225.2 702.1,232.2 712.6,225.2 723.2,225.2 733.7,225.2 744.2,229.0 754.7,229.0 765.3,229.0 775.8,229.0 786.3,229.0 796.8,225.2 807.4,229.0 818.0,229.0 828.5,225.2 839.0,225.2 849.5,232.2 860.0,232.2 870.6,236.1 881.1,243.1 891.7,243.1 902.2,236.1 912.7,239.3 919.4,232.2" fill="none" stroke="#1f9d76" stroke-width="2.4"/>
  <line x1="268.9" y1="250.2" x2="268.9" y2="430" stroke="#16241f" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="268.9" cy="250.2" r="5" fill="#16241f"/>
  <rect x="278.9" y="220.2" width="206" height="26" rx="6" fill="#16241f"/>
  <text x="290.9" y="238.2" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="700" fill="#ffffff">hit 63 &#176;C at ~7 min &#8594; Q4</text>
  <text x="495" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#56635f">minutes into run</text>
  <text x="22" y="270" text-anchor="middle" transform="rotate(-90 22 270)" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#56635f">CPU temperature (&#176;C)</text>
  <text x="40" y="496" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7c8682">One representative controller run (controller_001_retry of the N=5 set). Peak 67.5 &#176;C &#8212; well under the 82 &#176;C safety stop.</text>
  <text x="40" y="512" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7c8682">It switched back to Q8 as the load wound down at the end (~57 &#176;C). All five controller runs followed this pattern.</text>
</svg>